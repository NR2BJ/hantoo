# ============================================
# Hantoo Trading Platform
# ============================================
# 설정 파일 불필요 - 모든 앱 설정은 웹 UI에서 관리
# Portainer: Git 리포지토리 → 스택으로 바로 배포
# 리버스 프록시는 Docker 외부에서 설정 (REVERSE-PROXY.md 참고)
# Backend: :7655, Frontend: :7656
# ============================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hantoo
      POSTGRES_USER: hantoo
      POSTGRES_PASSWORD: hantoo-db-internal
    volumes:
      - hantoo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hantoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - hantoo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7655:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hantoo:hantoo-db-internal@postgres:5432/hantoo
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "7656:3000"
    environment:
      NEXT_PUBLIC_BACKEND_PORT: "7655"
    depends_on:
      - backend

volumes:
  hantoo_pgdata:
    external: true
  hantoo_redisdata:
    external: true
